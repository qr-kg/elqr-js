name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Check if @qr.kg/elqr-js version already exists on npm
        id: has_qrkg
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@qr.kg/elqr-js@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to @qr.kg/elqr-js (canonical)
        if: steps.has_qrkg.outputs.exists != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Switch package name to @qr-kg/elqr-js (mirror)
        run: |
          jq '.name = "@qr-kg/elqr-js"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Check if @qr-kg/elqr-js version already exists on npm
        id: has_qr_kg
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@qr-kg/elqr-js@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to @qr-kg/elqr-js (mirror)
        if: steps.has_qr_kg.outputs.exists != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@qr-kg"
          cache: npm

      - name: Publish to GitHub Packages (@qr-kg/elqr-js)
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
